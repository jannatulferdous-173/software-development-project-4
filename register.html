<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — MindMirror</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<header class="nav">
  <a href="index.html" class="nav__brand">
    <div class="nav__mark" aria-hidden="true">
      <span class="mark mark--a"></span><span class="mark mark--b"></span>
    </div>
    <span class="nav__word">MindMirror</span>
  </a>
</header>

<main class="auth">
  <div class="auth-card">
    <p class="panel__label">Get started</p>
    <h1 class="auth-card__title">Create your account</h1>
    <p class="auth-card__sub">A private space for your reflections.</p>

    <form class="auth-form" id="registerForm" novalidate>
      <label class="auth-field">
        <span>Name</span>
        <input type="text" name="name" placeholder="Your name" required>
      </label>

      <label class="auth-field">
        <span>Email</span>
        <input type="email" name="email" placeholder="you@example.com" required>
      </label>

      <label class="auth-field">
        <span>Password</span>
        <input type="password" name="password" placeholder="••••••••" required>
      </label>

      <label class="auth-field">
        <span>Confirm password</span>
        <input type="password" name="confirmPassword" placeholder="••••••••" required>
      </label>

      <button type="submit" class="btn-analyze btn-analyze--full">
        <span class="btn-analyze__text">Create account</span>
        <span class="btn-analyze__ripple" aria-hidden="true"></span>
      </button>

      <p class="auth-form__note" id="registerNote" hidden>This will connect to your backend once it's ready — no account is actually created yet.</p>
    </form>

    <p class="auth-card__switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</main>

<script src="auth.js"></script>
</body>
</html>
