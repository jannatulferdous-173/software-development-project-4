<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — MindMirror</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<header class="nav">
  <a href="index.html" class="nav__brand">
    <div class="nav__mark" aria-hidden="true">
      <span class="mark mark--a"></span><span class="mark mark--b"></span>
    </div>
    <span class="nav__word">MindMirror</span>
  </a>
</header>

<main class="auth">
  <div class="auth-card">
    <p class="panel__label">Welcome back</p>
    <h1 class="auth-card__title">Log in</h1>
    <p class="auth-card__sub">Come back to your reflections.</p>

    <div class="auth-social">
      <button type="button" class="auth-social-btn auth-social-btn--google" id="googleLoginBtn">
        <svg class="auth-social-btn__icon" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.85.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <div class="auth-divider"><span>or continue with email</span></div>

    <form class="auth-form" id="loginForm" novalidate>
      <label class="auth-field">
        <span>Email</span>
        <input type="email" name="email" placeholder="you@example.com" required>
      </label>

      <label class="auth-field">
        <span>Password</span>
        <input type="password" name="password" placeholder="••••••••" required>
      </label>

      <a href="#" class="auth-form__forgot">Forgot password?</a>

      <button type="submit" class="btn-analyze btn-analyze--full">
        <span class="btn-analyze__text">Log in</span>
        <span class="btn-analyze__ripple" aria-hidden="true"></span>
      </button>

      <p class="auth-form__note" id="loginNote" hidden>This will connect to your backend once it's ready — no account exists yet.</p>
    </form>

    <p class="auth-card__switch">Don't have an account? <a href="register.html">Register</a></p>
    <p class="auth-card__switch"><a href="index.html">Continue as guest →</a></p>
  </div>
</main>

<script src="auth.js"></script>
</body>
</html>
